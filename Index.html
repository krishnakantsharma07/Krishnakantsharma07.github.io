<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast | Krishna Sharma</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #74ebd5, #9face6);
            color: #333;
        }
        header {
            background-color: #1e3c72;
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        .owner {
            font-size: 20px;
            color: #ffd700;
            font-weight: bold;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        .weather-box {
            background: white;
            margin: 15px auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #1e3c72;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body><header>
    <h1>Weather Forecast Website</h1>
    <p class="owner">Owned by Krishna Sharma</p>
</header><div class="container">
    <h2>Today's Weather</h2><div class="weather-box">
    <h3>Delhi</h3>
    <p>Temperature: 30°C</p>
    <p>Condition: Sunny</p>
</div>

<div class="weather-box">
    <h3>Mumbai</h3>
    <p>Temperature: 28°C</p>
    <p>Condition: Humid</p>
</div>

<div class="weather-box">
    <h3>Jaipur</h3>
    <p>Temperature: 32°C</p>
    <p>Condition: Clear Sky</p>
</div>

</div><footer>
    <p>© 2026 Krishna Sharma | Weather Forecast</p>
</footer></body>
</html>
